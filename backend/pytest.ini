[pytest]
# Pytest configuration for LuminaIQ backend

# Test discovery patterns
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Test paths
testpaths = tests

# Minimum version
minversion = 8.0

# Output options
addopts = 
    -v
    --strict-markers
    --tb=short
    --disable-warnings

# Markers for test categorization
markers =
    unit: Unit tests (fast, no external dependencies)
    integration: Integration tests (require external services like Redis, Supabase)
    slow: Slow running tests
    asyncio: Async tests

# Async configuration
asyncio_mode = auto

# Coverage options (optional)
# Uncomment to enable coverage reporting
# addopts = --cov=backend --cov-report=html --cov-report=term

# Log configuration
log_cli = false
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(message)s
log_cli_date_format = %Y-%m-%d %H:%M:%S

# Ignore patterns
norecursedirs = .git .venv __pycache__ *.egg-info dist build

# Timeout for tests (in seconds)
timeout = 300
